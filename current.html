<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- Bootstrap CSS -->
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
    <!-- My CSS -->

    <!-- Bootstrap Javascript -->
     <script src="https://code.jquery.com/jquery-3.4.1.slim.min.js" integrity="sha384-J6qa4849blE2+poT4WnyKhv5vZF5SrPo0iEjwBvKU7imGFAV0wwj1yYfoRSJoZ+n" crossorigin="anonymous"></script>
     <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js" integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo" crossorigin="anonymous"></script>
     <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/js/bootstrap.min.js" integrity="sha384-wfSDF2E50Y2D1uUdj0O3uMBJnjuUD4Ih7YwaYd1iqfktj0Uod8GCExl3Og8ifwB6" crossorigin="anonymous"></script>

    <!-- Fonts -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins">
</head>
<body>
    <div id="navbar-placeholder"></div>
    <script>
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);

        fetch('navigation.html')
            .then(res => res.text())
            .then(data => {
                document.getElementById('navbar-placeholder').innerHTML = data;
                // Logic for active links
                const links = document.querySelectorAll('.nav-link');
                const currentPath = window.location.pathname.split("/").pop() || 'index.html';
                links.forEach(link => {
                    if (link.getAttribute('href') === currentPath) link.classList.add('active');
                });
                // Toggle Logic
                const toggleBtn = document.getElementById('theme-toggle');
                const currentTheme = localStorage.getItem('theme');
                const themeIcon = toggleBtn.querySelector('img');

                if (savedTheme === 'dark') {
                themeIcon.src = 'sun.png';
                themeIcon.alt = 'Switch to light mode';
            }

                toggleBtn.addEventListener('click', () => {
                    let theme = document.documentElement.getAttribute('data-theme');
                    if (theme === 'dark') {
                        document.documentElement.setAttribute('data-theme', 'light');
                        localStorage.setItem('theme', 'light');
                        themeIcon.src = 'moon.png'
                        themeIcon.alt = 'Switch to dark mode'
                    } else {
                        document.documentElement.setAttribute('data-theme', 'dark');
                        localStorage.setItem('theme', 'dark');
                        themeIcon.src = 'sun.png'
                        themeIcon.alt = 'Switch to light mode'
                    }
                })
            });
    </script>
    
    <div class="card title">
        <div class="card-body">
            <h1>Current Projects</h1>
        </div>
    </div>
    <div class="card subtitle">
        <div class="card-body">
            <h1>Personal</h1>
        </div>
    </div>
    <div class="row align-items-center">
        <div class="col-md-4">
            <div class="card proj">
                <div class="card-body">
                    <h3 style="color: #9842f5;">PlayProgress</h3>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card proj">
                <div class="card-body">
                    <h3 style="color: var(--primary);">Portfolio</h3>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card proj">
                <div class="card-body">
                    <h3 style="color: #fb7a11;">Pixel Picker</h3>
                    <p class="tag">Website</p>
                </div>
            </div>
        </div>
    </div>
</body>
